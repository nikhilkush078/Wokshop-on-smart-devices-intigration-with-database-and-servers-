<!DOCTYPE html>
<html>
<body>

    <input type="text" id="ip" placeholder="ESP32 IP (e.g., 192.168.1.15)">
    <button onclick="send('on')">ON</button>
    <button onclick="send('off')">OFF</button>

    <script>
        function send(action) {
            let espIp = document.getElementById("ip").value;
            fetch("http://" + espIp + "/" + action, { mode: 'no-cors' });
        }
    </script>

</body>
</html>
